<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Энциклопедия Невозможного | Премьера 2026</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS & Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deep: '#0f111a',
                        primary: '#3b82f6',
                        amber: { 400: '#fbbf24', 500: '#f59e0b', glow: 'rgba(251, 191, 36, 0.5)' },
                        emerald: { 400: '#34d399', 500: '#10b981' },
                        purple: { 400: '#c084fc', 500: '#a855f7' },
                        orange: { 400: '#fb923c', 500: '#f97316' },
                        red: { 500: '#ef4444', 600: '#dc2626' }
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                        cinematic: ['Oswald', 'sans-serif'],
                    },
                    backgroundImage: {
                        'space-nebula': 'radial-gradient(circle at center, rgba(56, 189, 248, 0.10) 0%, rgba(15, 17, 26, 1) 80%)',
                    },
                    boxShadow: {
                        'neon': '0 0 20px rgba(251, 191, 36, 0.2)',
                        'card': '0 10px 30px -10px rgba(0,0,0,0.5)',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0f111a; color: #e2e8f0; overflow-x: hidden; }
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f111a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* Hero Background */
        .hero-bg {
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        /* Radar Section Background */
        .radar-section-bg {
            background-image: url('unnamed.jpg'); 
            background-image: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=2094&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        
        .modal-overlay {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .cookie-banner {
            animation: slideUp 0.5s ease-out forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        /* Tech Shape for Mission Cards */
        .tech-shape {
            clip-path: polygon(
                20px 0, 100% 0, 
                100% calc(100% - 20px), calc(100% - 20px) 100%, 
                0 100%, 0 20px
            );
            transition: all 0.4s ease;
        }

        .tech-border-container {
            position: relative;
            padding: 2px;
            clip-path: polygon(
                20px 0, 100% 0, 
                100% calc(100% - 20px), calc(100% - 20px) 100%, 
                0 100%, 0 20px
            );
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
        }

        .tech-border-container:hover {
            transform: translateY(-5px);
            filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.3));
        }

        .logo-filter {
            filter: brightness(0) invert(1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const Icons = {
            Play: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            ChevronRight: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
            Check: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>,
            X: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Menu: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            Shield: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            User: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            PhoneOff: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="22" x2="2" y1="2" y2="22"/></svg>,
            Pizza: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 11h.01"/><path d="M11 15h.01"/><path d="M16 16h.01"/><path d="M2 16h20"/><path d="M6 16v4c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2v-4"/><path d="M2 16.13a7.6 7.6 0 0 1 2.5-4.5c2.3-1.8 4.5-2.6 6.5-5.9a2.1 2.1 0 0 1 3.5 1.5c1.4 5 4.3 6.9 7.5 8.9"/></svg>,
            Camera: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
            Star: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            Clock: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            MapPin: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
            Phone: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
            Send: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>,
            Instagram: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>,
            Vk: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M13.6 21.6C7.9 21.6 4.3 17.6 2.7 10H5.6C6.1 14.1 7.9 15.9 9.3 16.3V10H12V13.6C13.7 13.4 15.4 11.5 16 10H18.8C18.3 12.3 16.6 14 15.4 14.7C16.6 15.3 18.5 16.8 19.3 21.6H16.2C15.6 18.9 13.4 16.8 12.3 16.2V21.6H13.6Z"/></svg>,
            Award: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>,
            Briefcase: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
            Video: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>,
            Mic: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="23"/><line x1="8" x2="16" y1="23" y2="23"/></svg>,
            Trophy: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17"/><path d="M14 14.66V17"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/><path d="M8.5 22l1-4.66"/><path d="M15.5 22l-1-4.66"/></svg>,
            Music: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>,
            Globe: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>,
        };

        const PrivacyModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md modal-overlay" onClick={onClose}>
                    <div className="bg-slate-900 border border-white/10 rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto relative text-slate-300 p-8" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-4 right-4 p-2 bg-black/50 rounded-full text-white hover:text-amber-400 transition-colors z-10">
                            <Icons.X className="w-6 h-6"/>
                        </button>
                        <h2 className="text-2xl font-bold text-white mb-6 font-cinematic uppercase">Политика конфиденциальности</h2>
                        <div className="space-y-4 text-sm">
                             <p>Настоящая политика обработки персональных данных составлена в соответствии с требованиями Федерального закона от 27.07.2006. №152-ФЗ «О персональных данных» и определяет порядок обработки персональных данных и меры по обеспечению безопасности персональных данных, предпринимаемые Центром развития «Три Кита» (далее — Оператор).</p>
                             <p>1. Оператор ставит своей важнейшей целью и условием осуществления своей деятельности соблюдение прав и свобод человека и гражданина при обработке его персональных данных, в том числе защиты прав на неприкосновенность частной жизни, личную и семейную тайну.</p>
                             <p>2. Оператор может обрабатывать следующие персональные данные Пользователя: Фамилия, имя, отчество; Электронный адрес; Номера телефонов; Данные о детях (имя, возраст), необходимые для предоставления услуг.</p>
                             <p>3. Цель обработки персональных данных Пользователя — информирование посредством отправки электронных писем; предоставление доступа к сервисам, информации и/или материалам, содержащимся на веб-сайте; запись на образовательные программы.</p>
                             <p>4. Оператор обеспечивает сохранность персональных данных и принимает все возможные меры, исключающие доступ к персональным данным неуполномоченных лиц.</p>
                             <p>5. Пользователь может получить любые разъяснения по интересующим вопросам, касающимся обработки его персональных данных, обратившись к Оператору.</p>
                        </div>
                    </div>
                </div>
            );
        };

        const CookieConsent = ({ onOpenPrivacy }) => {
            const [isVisible, setIsVisible] = useState(true);

            const acceptCookies = () => {
                setIsVisible(false);
            };

            if (!isVisible) return null;

            return (
                <div className="fixed bottom-0 left-0 right-0 z-[100] p-4 bg-slate-900/95 backdrop-blur-md border-t border-white/10 cookie-banner">
                    <div className="container mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                        <p className="text-slate-300 text-xs md:text-sm text-center md:text-left">
                            Мы используем файлы cookie для улучшения работы сайта. Продолжая использовать сайт, вы соглашаетесь с нашей <button onClick={onOpenPrivacy} className="text-amber-400 hover:underline bg-transparent border-0 p-0 inline">Политикой конфиденциальности</button>.
                        </p>
                        <button onClick={acceptCookies} className="px-6 py-2 bg-amber-400 text-black font-bold uppercase text-xs tracking-widest rounded-sm hover:bg-white transition-colors shrink-0">
                            Согласиться
                        </button>
                    </div>
                </div>
            );
        };

        const VideoModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md modal-overlay" onClick={onClose}>
                    <div className="relative w-full max-w-4xl aspect-video bg-black rounded-xl overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-4 right-4 p-2 bg-black/50 rounded-full text-white hover:text-amber-400 transition-colors z-10">
                            <Icons.X className="w-6 h-6"/>
                        </button>
                        <div className="w-full h-full flex items-center justify-center text-slate-500">
                             <iframe 
                                src="https://drive.google.com/file/d/1F1GQY4Lnsf6Dz_7mhmPOVIoIwmjfH6ch/preview" 
                                width="100%" 
                                height="100%" 
                                frameBorder="0" 
                                allow="autoplay"
                            ></iframe>
                        </div>
                    </div>
                </div>
            );
        };

        const Modal = ({ isOpen, onClose, mission }) => {
            if (!isOpen || !mission) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md modal-overlay" onClick={onClose}>
                    <div className="bg-slate-900 border border-white/10 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto relative" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-4 right-4 p-2 bg-black/50 rounded-full text-white hover:text-amber-400 transition-colors z-10">
                            <Icons.X className="w-6 h-6"/>
                        </button>
                        
                        <div className="h-48 bg-cover bg-center relative" style={{backgroundImage: `url(${mission.image})`}}>
                            <div className="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent"></div>
                            <div className="absolute bottom-6 left-6">
                                <span className={`inline-block px-3 py-1 rounded text-xs font-bold uppercase tracking-widest mb-2 text-black ${mission.bg}`}>{mission.dates}</span>
                                <h3 className="text-3xl font-bold text-white font-cinematic uppercase">{mission.title}</h3>
                            </div>
                        </div>
                        
                        <div className="p-8 space-y-8">
                            <div>
                                <h4 className="text-amber-400 font-bold uppercase tracking-widest text-sm mb-3">🗺️ Легенда</h4>
                                <p className="text-slate-300 leading-relaxed">{mission.legendFull}</p>
                            </div>
                            
                            <div>
                                <h4 className="text-emerald-400 font-bold uppercase tracking-widest text-sm mb-3">🛠️ Чему научимся</h4>
                                <ul className="space-y-2 text-slate-300">
                                    {mission.learnList.map((item, i) => (
                                        <li key={i} className="flex gap-2">
                                            <span className="text-emerald-500">•</span> {item}
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            <div>
                                <h4 className="text-purple-400 font-bold uppercase tracking-widest text-sm mb-3">🚀 Выходы и Экскурсии</h4>
                                <ul className="space-y-2 text-slate-300">
                                    {mission.excursions.map((item, i) => (
                                        <li key={i} className="flex gap-2">
                                            <span className="text-purple-500 font-bold">{i+1}.</span> {item}
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            <button onClick={onClose} className="w-full py-4 bg-white/5 border border-white/20 text-white font-bold uppercase tracking-widest hover:bg-amber-400 hover:text-black transition-all rounded-sm">
                                Закрыть протокол
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Nav = ({ onOpenPrivacy }) => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileOpen, setIsMobileOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${isScrolled ? 'bg-deep/95 backdrop-blur-md py-4 border-b border-white/5 shadow-lg' : 'py-6 bg-transparent'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center relative z-50">
                        <div className="flex items-center gap-4 flex-1 justify-start">
                            {/* Logo centered */}
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-gradient-to-tr from-amber-400 to-amber-600 rounded flex items-center justify-center font-bold text-black font-cinematic text-2xl shadow-[0_0_15px_rgba(251,191,36,0.3)] shrink-0 mt-4">Э</div>
                                <div className="flex flex-col justify-center h-12">
                                    <div className="text-[10px] tracking-[0.3em] uppercase text-amber-400 font-bold leading-tight mb-0.5">Летний Проект</div>
                                    <div className="text-lg md:text-xl font-bold tracking-tight uppercase font-cinematic leading-none text-white">
                                        Энциклопедия<br/>Невозможного
                                    </div>
                                </div>
                            </div>
                        </div>
