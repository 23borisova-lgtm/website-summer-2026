                return () => clearTimeout(timer);
            }, []);

            if (!isVisible) return null;

            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm modal-overlay" onClick={() => setIsVisible(false)}>
                      <div className="bg-slate-900/90 border border-white/10 rounded-3xl max-w-4xl w-full relative p-10 shadow-[0_0_80px_rgba(251,191,36,0.15)] flex flex-col md:flex-row gap-10 items-center popup-blur" onClick={e => e.stopPropagation()}>
                        <button onClick={() => setIsVisible(false)} className="absolute top-6 right-6 p-2 text-slate-500 hover:text-white transition-colors bg-white/5 rounded-full">
                            <Icons.X className="w-6 h-6"/>
                        </button>
                        
                        <div className="flex-1 text-center md:text-left">
                            <div className="inline-block px-3 py-1 bg-amber-500/10 border border-amber-500/20 text-amber-400 rounded-full text-xs font-bold uppercase tracking-widest mb-6 animate-pulse">
                                Трансформация
                            </div>
                            <h3 className="text-4xl md:text-5xl font-bold text-white font-cinematic uppercase mb-6 leading-[0.9]">
                                Это не лагерь.<br/>
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-600">Это жизнь внутри истории.</span>
                            </h3>
                            
                            <div className="flex flex-col sm:flex-row gap-4 mt-8">
                                 <button onClick={() => { setIsVisible(false); onOpenVideo(); }} className="px-8 py-4 bg-white/5 border border-white/10 text-white font-bold uppercase tracking-widest rounded-lg hover:bg-white/10 transition-all flex items-center justify-center gap-3 group">
                                    <Icons.Video className="w-5 h-5 text-amber-400 group-hover:scale-110 transition-transform"/>
                                    Смотреть видео
                                </button>
                                <button onClick={() => { setIsVisible(false); document.getElementById('сюжет').scrollIntoView({behavior: 'smooth'}); }} className="px-8 py-4 bg-amber-400 text-black font-bold uppercase tracking-widest rounded-lg hover:bg-white hover:scale-105 transition-all shadow-neon">
                                    Выбрать роль
                                </button>
                            </div>
                        </div>
                        
                        {/* Infographic Grid */}
                        <div className="grid grid-cols-2 gap-4 w-full md:w-auto min-w-[300px]">
                            <div className="p-6 bg-white/5 rounded-2xl border border-white/5 text-center group hover:bg-white/10 transition-colors">
                                <div className="text-3xl font-bold text-white font-cinematic mb-1 group-hover:text-amber-400 transition-colors">10</div>
                                <div className="text-[10px] uppercase tracking-widest text-slate-400">Жизней</div>
                            </div>
                             <div className="p-6 bg-white/5 rounded-2xl border border-white/5 text-center group hover:bg-white/10 transition-colors">
                                <div className="text-3xl font-bold text-white font-cinematic mb-1 group-hover:text-amber-400 transition-colors">4</div>
                                <div className="text-[10px] uppercase tracking-widest text-slate-400">Вселенные</div>
                            </div>
                             <div className="p-6 bg-white/5 rounded-2xl border border-white/5 text-center col-span-2 group hover:bg-white/10 transition-colors">
                                <div className="text-3xl font-bold text-white font-cinematic mb-1 group-hover:text-amber-400 transition-colors">100%</div>
                                <div className="text-[10px] uppercase tracking-widest text-slate-400">Погружение</div>
                            </div>
                        </div>
                        
                      </div>
                </div>
            )
        }

        const LeadForm = () => {
            const [status, setStatus] = useState('idle'); // idle | sending | success | error
            const [form, setForm] = useState({ name: '', childName: '', childAge: '', phone: '', tariff: '' });
            const [formError, setFormError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                // Проверка перед отправкой: все обязательные поля + корректный телефон и возраст.
                const phoneDigits = (form.phone || '').replace(/\D/g, '');
                const age = parseInt(form.childAge, 10);
                if (!form.name.trim() || !form.childName.trim() || !form.childAge.trim() || !form.phone.trim()) {
                    setFormError('Пожалуйста, заполните все обязательные поля.');
                    return;
                }
                if (isNaN(age) || age < 4 || age > 17) {
                    setFormError('Укажите возраст ребёнка числом от 4 до 17.');
                    return;
                }
                if (phoneDigits.length < 10) {
                    setFormError('Укажите корректный номер телефона (не меньше 10 цифр).');
                    return;
                }
                setFormError('');
                setStatus('sending');
                try {
                    // Заявка уходит на нашу функцию /api/lead → AlfaCRM (лид) + уведомление админу в MAX.
                    const res = await fetch('/api/lead', {
                        method: 'POST',
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            parentName: form.name,
                            childName: form.childName,
                            childAge: form.childAge,
                            phone: form.phone,
                            tariff: form.tariff || ''
                        })
                    });
                    if (res.ok) {
                        setStatus('success');
                        track('lead'); // цель в Яндекс.Метрике
                    } else {
                        setStatus('error');
                    }
                } catch (err) {
                    setStatus('error');
                }
            };

            return (
                <section id="заявка" className="py-24 bg-deep relative border-t border-white/5">
                    <div className="container mx-auto px-6 max-w-2xl">
                        <div className="text-center mb-10">
                            <h2 className="text-3xl md:text-5xl font-bold text-white mb-4 font-cinematic uppercase">Забронировать место</h2>
                            <p className="text-slate-400">Оставьте контакты — перезвоним, расскажем о сменах и зафиксируем скидку раннего бронирования. Мест в группе всего 15.</p>
                        </div>

                        {status === 'success' ? (
                            <div className="glass-panel p-10 rounded-2xl text-center border border-emerald-500/30 relative">
                                <button
                                    onClick={() => { setStatus('idle'); setForm({ name: '', childName: '', childAge: '', phone: '', tariff: '' }); setFormError(''); }}
                                    aria-label="Закрыть"
                                    className="absolute top-4 right-4 p-2 text-slate-400 hover:text-white bg-white/5 hover:bg-white/10 rounded-full transition-colors"
                                >
                                    <Icons.X className="w-5 h-5" />
                                </button>
                                <div className="text-emerald-400 text-5xl mb-4">✓</div>
                                <h3 className="text-2xl font-bold text-white mb-2">Заявка отправлена!</h3>
                                <p className="text-slate-400">Мы свяжемся с вами в ближайшее время. Хотите быстрее — напишите нам в удобный мессенджер:</p>
                                <div className="flex flex-col sm:flex-row gap-3 justify-center mt-6">
                                    <a href="https://t.me/TriKitaPenza" target="_blank" rel="noopener noreferrer" onClick={() => track('telegram')} className="inline-flex items-center justify-center gap-2 px-8 py-3 bg-amber-400 hover:bg-white text-black font-bold uppercase tracking-widest transition-all rounded-sm">
                                        <Icons.Send className="w-5 h-5" /> Телеграм
                                    </a>
                                    <a href={MAX_LINK} target="_blank" rel="noopener noreferrer" onClick={() => track('max')} className="inline-flex items-center justify-center gap-2 px-8 py-3 bg-sky-500 hover:bg-sky-400 text-white font-bold uppercase tracking-widest transition-all rounded-sm">
                                        <Icons.Max className="w-5 h-5" /> MAX
                                    </a>
                                </div>
                                <p className="text-slate-400 text-sm mt-6 flex items-center justify-center gap-2">
                                    <Icons.Phone className="w-4 h-4 text-amber-400" /> Или позвоните: <span className="text-white font-bold select-all">+7 (937) 403-72-48</span>
                                </p>
                            </div>
                        ) : (
                            <form onSubmit={handleSubmit} className="glass-panel p-8 md:p-10 rounded-2xl space-y-5">
                                <div>
                                    <label className="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Имя родителя *</label>
                                    <input
                                        type="text" required value={form.name}
                                        onChange={(e) => setForm({ ...form, name: e.target.value })}
                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:border-amber-400 focus:outline-none transition-colors"
                                        placeholder="Например, Екатерина"
                                    />
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-5">
                                    <div className="sm:col-span-2">
                                        <label className="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Имя ребёнка *</label>
                                        <input
                                            type="text" required value={form.childName}
                                            onChange={(e) => setForm({ ...form, childName: e.target.value })}
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:border-amber-400 focus:outline-none transition-colors"
                                            placeholder="Например, Артём"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Возраст *</label>
                                        <input
                                            type="number" required min="4" max="17" value={form.childAge}
                                            onChange={(e) => setForm({ ...form, childAge: e.target.value })}
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:border-amber-400 focus:outline-none transition-colors"
                                            placeholder="лет"
                                        />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Телефон *</label>
                                    <input
                                        type="tel" required value={form.phone}
                                        inputMode="tel" autoComplete="tel" maxLength={18}
                                        onChange={(e) => { setForm({ ...form, phone: e.target.value }); if (formError) setFormError(''); }}
                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:border-amber-400 focus:outline-none transition-colors"
                                        placeholder="+7 (___) ___-__-__"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Интересует тариф (необязательно)</label>
                                    <select
                                        value={form.tariff}
                                        onChange={(e) => setForm({ ...form, tariff: e.target.value })}
                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-amber-400 focus:outline-none transition-colors"
                                    >
                                        <option value="" className="bg-slate-900">Ещё не выбрал(а)</option>
                                        <option value="Разведчик (5 дней)" className="bg-slate-900">Разведчик — 5 дней</option>
                                        <option value="Кадет (10 дней)" className="bg-slate-900">Кадет — 1 сезон (10 дней)</option>
                                        <option value="Исследователь (4 недели)" className="bg-slate-900">Исследователь — 2 сезона (4 недели)</option>
                                        <option value="Командор (всё лето)" className="bg-slate-900">Командор — всё лето</option>
                                    </select>
                                </div>

                                {formError && (
                                    <p className="text-red-400 text-sm">{formError}</p>
                                )}
                                {status === 'error' && (
                                    <p className="text-red-400 text-sm">Не удалось отправить. Напишите нам напрямую в Телеграм @TriKitaPenza или по телефону.</p>
                                )}

                                <button
                                    type="submit" disabled={status === 'sending'}
                                    className="w-full py-4 bg-amber-400 hover:bg-white text-black font-bold uppercase tracking-widest transition-all rounded-sm shadow-neon disabled:opacity-60"
                                >
                                    {status === 'sending' ? 'Отправляем…' : 'Отправить заявку'}
                                </button>
                                <p className="text-center text-slate-500 text-xs">
                                    Нажимая кнопку, вы соглашаетесь с <button type="button" onClick={() => window.openPrivacyModal()} className="text-amber-400 hover:underline bg-transparent border-0 p-0 inline">политикой конфиденциальности</button>.
                                </p>
                            </form>
                        )}
                    </div>
                </section>
            );
        };

        const App = () => {
            const [privacyOpen, setPrivacyOpen] = useState(false);
            const [videoOpen, setVideoOpen] = useState(false);
            
            useEffect(() => {
                window.openPrivacyModal = () => setPrivacyOpen(true);
            }, []);

            return (
                <div className="min-h-screen font-sans selection:bg-amber-500 selection:text-black">
                    <Nav />
                    <Hero onOpenVideo={() => setVideoOpen(true)} /> 
                    <Methodology />
                    <Events />
                    <MissionRadar />
                    <SkillTree />
                    <HeroProfile />
                    <Security />
                    <Gallery />
                    <FAQ />
                    <Pricing />
                    <LeadForm />
                    <Footer />
                    <CookieConsent onOpenPrivacy={() => setPrivacyOpen(true)} />
                    <PrivacyModal isOpen={privacyOpen} onClose={() => setPrivacyOpen(false)} />
                    <VideoModal isOpen={videoOpen} onClose={() => setVideoOpen(false)} />
                    <PromoPopup onClose={() => {}} onOpenVideo={() => setVideoOpen(true)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
